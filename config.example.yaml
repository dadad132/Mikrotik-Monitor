# ============================================================================
# MikroTik Monitor (mikromon) — example configuration
#
# Copy this file to `config.yaml` and edit it. `config.yaml` is gitignored so
# your credentials stay out of version control.
#
#   cp config.example.yaml config.yaml
#
# All thresholds defined under `defaults:` apply to every device and can be
# overridden per-device under `devices[].thresholds:`.
# ============================================================================

# How often (seconds) to poll every device. 60s is a good balance.
poll_interval: 60

# Where to persist state between runs (which conditions are already alerted,
# last-seen log lines, known DHCP clients, etc). Relative to the working dir.
state_file: ./state.json

# Logging verbosity for the monitor itself: DEBUG / INFO / WARNING / ERROR
log_level: INFO

# Time-series metrics -> SQLite file. Powers the web dashboard and the
# Prometheus /metrics endpoint (for Grafana). Comment out to disable.
metrics_db: ./metrics.db
metrics_retention_days: 30

# Web dashboard (run it with:  python -m mikromon dashboard -c config.yaml)
web:
  host: 127.0.0.1     # 0.0.0.0 to expose on the network — see "access anywhere" below
  port: 8080
  secure_cookies: false   # set true when serving over HTTPS (behind a proxy/tunnel)
  # domain: easymikrotik.com   # your public domain — the installer sets up nginx +
  #                            # Let's Encrypt TLS automatically when this is set.
  #                            # Or pass as env var: DOMAIN=easymikrotik.com sudo bash deploy/install.sh
  # Token for Prometheus/Grafana to scrape /metrics without a login. Generate a
  # random one, e.g.  python -c "import secrets;print(secrets.token_urlsafe(24))"
  # metrics_token: "paste-a-long-random-token-here"

# User accounts for the dashboard. When set, the dashboard requires login.
# Accounts are multi-tenant: each belongs to a COMPANY and signs in by EMAIL.
# Anyone can self-register a company at /signup (becoming its owner); owners then
# add team members and choose which devices each one sees, from the Team page.
# (CLI equivalent:  python -m mikromon useradd --user owner@acme.com \
#     --password 'strong-pass' --company 'Acme' --role owner -c config.yaml)
auth_db: ./auth.db

# ----------------------------------------------------------------------------
# Billing — leave commented for unlimited free access (no device caps at all).
# `db:` alone is enough to turn on trials + free-plan device caps and the
# superadmin "Assign plan" control (Platform admin -> manual, off-platform
# billing). The payfast_* fields are ONLY needed if you also want the
# self-serve "Subscribe" buttons / online checkout; without them those
# buttons stay hidden and everything else still works.
# Set ITN notify URL in your PayFast dashboard to:
#   https://yourdomain.com/billing/itn
# ----------------------------------------------------------------------------
# billing:
#   db: ./billing.db
#   payfast_merchant_id: "10000100"        # PayFast → Integration → Merchant Details
#   payfast_merchant_key: "46f0cd694581a"  # PayFast → Integration → Merchant Details
#   payfast_passphrase: "your-passphrase"  # PayFast → Integration → Settings
#   sandbox: false                          # true for sandbox.payfast.co.za testing

# Manage devices from the dashboard (admins use the /devices page to add, edit,
# delete, and test routers) instead of editing this file. When set, the devices
# below are imported once to seed it; after that the database is the source of
# truth and the monitor picks up changes on its next poll (no restart needed).
devices_db: ./devices.db

# Config-push audit trail -> SQLite file. Powers the "Activity" tab (who
# pushed what, when, and whether it succeeded) and the pre-change safety
# backups' history. Leave commented to disable logging entirely.
push_log_db: ./push_log.db

# On-demand WebFig / Winbox access through the hub. When set, each device page
# gets "Open WebFig" / "Open Winbox" buttons that expose a time-limited public
# port on the hub, proxied to the router over the WireGuard tunnel, then auto-
# close. Requires nginx (with the stream module) + a TLS cert on the hub — see
# deploy/REMOTE-ACCESS.md for the full setup. Leave commented to disable.
# access:
#   hub_host: access.example.com          # public hostname customers connect to
#   ttl_minutes: 15                       # how long a grant stays open
#   grants_file: /opt/mikromon/access-grants.json
#   tls_cert: /etc/letsencrypt/live/access.example.com/fullchain.pem
#   tls_key:  /etc/letsencrypt/live/access.example.com/privkey.pem
#   nginx_http_conf:   /etc/nginx/conf.d/easymikrotik-access.conf
#   nginx_stream_conf: /etc/nginx/streams.d/easymikrotik-access.conf

# Accessing from anywhere (securely):
#   * Easiest & safest: a tunnel — Cloudflare Tunnel, Tailscale, or ngrok —
#     so you DON'T port-forward. Point it at 127.0.0.1:8080.
#   * Or a reverse proxy (Caddy/nginx) terminating HTTPS in front of the
#     dashboard; then set web.host: 0.0.0.0 and web.secure_cookies: true.
#   Always use HTTPS for remote access so the login cookie isn't sent in clear.

# Require a condition to be observed this many polls in a row before alerting.
# 2 means a single bad poll (a blip) will NOT page you — it must persist.
confirmations: 2

# ----------------------------------------------------------------------------
# Email / SMTP — where alerts are delivered.
# ----------------------------------------------------------------------------
smtp:
  # cPanel / shared hosting (e.g. domains.co.za):
  # Port 465 with implicit SSL is recommended — more reliable than 587 STARTTLS.
  host: mail.yourdomain.com
  port: 465
  username: noreply@yourdomain.com
  password: "your-email-password"
  use_ssl: true                       # implicit SSL on port 465 (recommended)
  use_tls: false                      # set true and port: 587 for STARTTLS instead
  from_addr: noreply@yourdomain.com
  # to_addrs is used only when per-org alert_emails are not configured.
  # In multi-tenant mode each company manages its own recipient list via the
  # Admin → Company details page. Leave this list empty or add a fallback.
  to_addrs: []
  subject_prefix: "[EasyMikrotik]"
  # Only email alerts at or above this severity: INFO / WARNING / CRITICAL
  min_severity: WARNING

# ----------------------------------------------------------------------------
# Default thresholds (apply to all devices unless overridden).
# ----------------------------------------------------------------------------
defaults:
  cpu_warn: 80              # % CPU load -> WARNING
  cpu_crit: 95             # % CPU load -> CRITICAL
  mem_free_warn_pct: 15    # free RAM below this % -> WARNING
  mem_free_crit_pct: 7     # free RAM below this % -> CRITICAL
  disk_free_warn_pct: 15   # free storage below this % -> WARNING
  disk_free_crit_pct: 5    # free storage below this % -> CRITICAL
  temp_warn_c: 60          # board temperature -> WARNING
  temp_crit_c: 75          # board temperature -> CRITICAL
  flap_window_s: 600       # window for counting interface link-downs
  flap_threshold: 4        # link-downs within window -> flapping alert

  # Learned-baseline anomaly detection (device-count / WAN traffic / per-client).
  # "Normal" is learned automatically per time-of-day; these tune sensitivity.
  baseline_alpha: 0.1      # how fast it adapts (lower = steadier, less twitchy)
  baseline_warmup: 24      # samples a time-slot needs before it can alert
  baseline_z: 3.0          # std-devs above normal to call something abnormal
  baseline_buckets: hour   # hour | hourweek (separate weekends) | global
  client_min_count: 5      # ignore device-count spikes on tiny networks
  client_count_ratio: 1.5  # must be >=1.5x the typical device count to alert
  traffic_floor_mbit: 1    # ignore throughput spikes on near-idle links
  traffic_ratio: 1.5       # must be >=1.5x typical throughput to alert
  client_floor_mbit: 5     # ignore per-client usage below this
  client_usage_ratio: 2.0  # a client must use >=2x its own normal to alert

# ----------------------------------------------------------------------------
# Devices to monitor.
# ----------------------------------------------------------------------------
# Devices are managed in the DASHBOARD now (you set `devices_db:` above): add,
# edit and delete routers at http://<server>:8090/devices — no YAML editing.
# A fresh install therefore starts with NO devices and re-installing will NOT
# recreate a sample router. Prefer to manage them in YAML instead? Rename
# `devices_example:` below to `devices:` and fill in your own routers.
devices: []

devices_example:
  - name: "HQ-Router"
    host: 192.168.88.1
    api_port: 8728           # 8728 = plain API, 8729 = API-SSL
    username: monitor        # use a dedicated READ-ONLY user (see README)
    password: "change-me"
    use_ssl: false
    verify_ssl: false        # set true if the router has a valid certificate
    timeout: 60

    # LAN subnets — logins/activity sourced from OUTSIDE these are treated as
    # higher-risk (e.g. an admin login from a public IP).
    lan_subnets:
      - 192.168.88.0/24

    # WAN failover detection. Leave `wan:` empty to AUTO-DETECT: the monitor
    # treats the lowest-distance default route as "primary" and alerts when a
    # higher-distance backup route is carrying traffic instead. Fill it in to
    # get friendlier names in the alerts and to pin link priority.
    #
    # List the uplinks in PRIORITY ORDER (highest first). Two, three, four or
    # more links are all supported — add as many as the router has. A friendly
    # `name:` (the ISP) shows up in alerts and on the dashboard.
    wan:
      links:
        - name: Vodacom          # highest priority (primary)
          interface: ether1
          gateway: ""            # optional: the next-hop IP for this link
        - name: MTN              # first backup
          interface: ether2
          gateway: ""
        - name: Telkom           # second backup
          interface: ether3
          gateway: ""
        - name: LTE              # last-resort link
          interface: lte1
          gateway: ""
      # The legacy `primary:`/`backup:` form is still accepted for back-compat.
      # Optional active probe: ping these from the router to confirm real
      # reachability (not just that a route exists). Empty = route-table only.
      ping_targets: []        # e.g. [8.8.8.8, 1.1.1.1]

    # Interfaces to watch for link down / flapping. Empty = watch all enabled
    # physical-ish interfaces automatically.
    monitor_interfaces:
      - ether1
      - lte1

    # Which sources to count for the device-count anomaly check.
    # Options: dhcp (bound leases), wireless (wifi clients), arp, hotspot.
    client_count_sources: [dhcp, wireless]

    # Interfaces to track for WAN throughput. Empty = auto (the wan: uplinks).
    traffic_interfaces: []

    # Toggle individual checks for this device.
    checks:
      reachability: true       # is the router itself answering on the API port
      wan_failover: true       # client moved onto a backup uplink
      internet_down: true      # no usable default route / all WANs down
      resources: true          # CPU / RAM / disk / temperature / reboot
      interfaces: true         # link up/down and flapping
      security: true           # logins, failed logins, config changes
      dhcp_new_clients: false  # alert when a never-before-seen client appears
      client_count: true       # abnormally many connected devices (learned)
      wan_traffic: true        # abnormal WAN throughput / data usage (learned)
      client_usage: false      # per-client top-talkers (needs queues/kid-control)

    # Per-device overrides (optional) — same keys as `defaults:`.
    # thresholds:
    #   cpu_warn: 70

  # - name: "Branch-2"
  #   host: 10.20.0.1
  #   api_port: 8728
  #   username: monitor
  #   password: "change-me"
  #   checks:
  #     dhcp_new_clients: true
